<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rakuen · Anime Sanctuary v3.4.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            orange: '#ff6b2b',
                            dark: '#050508',
                            surface: '#0d0d15',
                            border: '#1e1e2e'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050508; color: #e2e8f0; min-height: 100vh; }
        .glass-header { background: rgba(8, 8, 14, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #1e1e2e; }
        
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        @media (min-width: 640px) { .anime-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .anime-grid { grid-template-columns: repeat(4, 1fr); gap: 1.5rem; } }
        @media (min-width: 1024px) { .anime-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1280px) { .anime-grid { grid-template-columns: repeat(6, 1fr); } }

        .anime-card {
            background: #0d0d15;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #1e1e2e;
            transition: all 0.3s ease;
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .anime-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b2b;
            box-shadow: 0 10px 20px -10px rgba(255, 107, 43, 0.3);
        }
        .anime-card img {
            aspect-ratio: 2/3;
            width: 100%;
            object-cover: cover;
        }
        .anime-card-content { padding: 0.75rem; flex-grow: 1; }
        
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 107, 43, 0.1);
            border-top: 3px solid #ff6b2b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Fix for overlaps */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Header -->
    <header class="glass-header fixed top-0 left-0 w-full z-50">
        <div class="container mx-auto px-4 h-16 md:h-20 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 bg-brand-orange rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-dragon text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight hidden sm:block">Rakuen <span class="text-brand-orange text-xs">v3.4.2</span></h1>
            </div>

            <div class="flex-1 max-w-xl relative group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-brand-orange transition-colors"></i>
                <input type="text" id="searchInput" 
                    class="w-full bg-brand-dark border border-brand-border rounded-2xl py-2.5 pl-11 pr-4 text-sm focus:outline-none focus:border-brand-orange transition-all"
                    placeholder="Rechercher un anime...">
            </div>

            <div class="flex items-center gap-2">
                <button id="calendarBtn" class="p-2.5 rounded-xl hover:bg-white/5 text-gray-400 hover:text-brand-orange transition-all">
                    <i class="fas fa-calendar-alt"></i>
                </button>
                <button id="favBtn" class="p-2.5 rounded-xl hover:bg-white/5 text-gray-400 hover:text-red-500 transition-all">
                    <i class="fas fa-heart"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="container mx-auto px-4 pt-24 pb-12">
        <div id="statusContainer" class="mb-6 flex items-center justify-between text-sm">
            <span id="resultCount" class="text-gray-500 font-medium">Chargement du catalogue...</span>
            <div id="filterTags" class="flex gap-2"></div>
        </div>

        <div id="loader" class="flex justify-center py-20"><div class="loader"></div></div>
        <div id="animeGrid" class="anime-grid hidden"></div>
        
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <i class="fas fa-search text-4xl text-gray-700 mb-4"></i>
            <p class="text-gray-400">Aucun résultat trouvé.</p>
        </div>
    </main>

    <!-- Modal -->
    <div id="detailModal" class="fixed inset-0 z-[100] hidden overflow-y-auto bg-black/90 backdrop-blur-sm p-4">
        <div class="min-h-screen flex items-center justify-center">
            <div class="bg-brand-surface border border-brand-border w-full max-w-4xl rounded-2xl overflow-hidden relative animate-fade-in">
                <button id="closeModal" class="absolute top-4 right-4 z-10 w-8 h-8 bg-black/50 hover:bg-brand-orange rounded-full flex items-center justify-center transition-all">
                    <i class="fas fa-times text-sm"></i>
                </button>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        const RAKUEN = {
            config: {
                api: 'https://api.jikan.moe/v4',
                proxy: 'https://corsproxy.io/?'
            },
            state: {
                all: [],
                filtered: [],
                favs: JSON.parse(localStorage.getItem('rakuen_favs_v3') || '[]'),
                fuse: null
            },

            async init() {
                this.bindEvents();
                await this.loadCatalog();
            },

            bindEvents() {
                document.getElementById('searchInput').addEventListener('input', (e) => this.handleSearch(e.target.value));
                document.getElementById('closeModal').addEventListener('click', () => this.toggleModal(false));
                document.getElementById('favBtn').addEventListener('click', () => this.toggleFavsFilter());
                document.getElementById('calendarBtn').addEventListener('click', () => this.loadCalendar());
            },

            async fetchAPI(path) {
                try {
                    const url = `${this.config.proxy}${encodeURIComponent(this.config.api + path)}`;
                    const res = await fetch(url);
                    return await res.json();
                } catch (e) {
                    console.error(e);
                    return null;
                }
            },

            async loadCatalog() {
                this.showLoader(true);
                const [top, seasonal] = await Promise.all([
                    this.fetchAPI('/top/anime?limit=25'),
                    this.fetchAPI('/seasons/now?limit=25')
                ]);

                let data = [];
                if (top?.data) data = [...data, ...top.data];
                if (seasonal?.data) data = [...data, ...seasonal.data];

                // Deduplicate
                this.state.all = Array.from(new Map(data.map(a => [a.mal_id, a])).values());
                this.state.filtered = [...this.state.all];
                
                this.setupFuse();
                this.renderGrid();
                this.showLoader(false);
            },

            setupFuse() {
                this.state.fuse = new Fuse(this.state.all, {
                    keys: ['title', 'title_english', 'synopsis'],
                    threshold: 0.4
                });
            },

            handleSearch(q) {
                if (!q.trim()) {
                    this.state.filtered = [...this.state.all];
                } else {
                    this.state.filtered = this.state.fuse.search(q).map(r => r.item);
                }
                this.renderGrid();
            },

            renderGrid() {
                const grid = document.getElementById('animeGrid');
                const empty = document.getElementById('emptyState');
                const count = document.getElementById('resultCount');

                grid.innerHTML = this.state.filtered.map(a => `
                    <div class="anime-card" onclick="RAKUEN.openDetail(${a.mal_id})">
                        <div class="relative">
                            <img src="${a.images.jpg.large_image_url}" alt="${a.title}" loading="lazy">
                            <div class="absolute top-2 left-2 flex flex-col gap-1">
                                <span class="bg-brand-orange text-[10px] font-bold px-1.5 py-0.5 rounded shadow-lg">${a.type || 'TV'}</span>
                                ${a.score ? `<span class="bg-black/70 text-[10px] font-bold px-1.5 py-0.5 rounded border border-white/10"><i class="fas fa-star text-yellow-400 mr-1"></i>${a.score}</span>` : ''}
                            </div>
                        </div>
                        <div class="anime-card-content">
                            <h3 class="text-sm font-bold line-clamp-2 leading-tight">${a.title}</h3>
                            <p class="text-[10px] text-gray-500 mt-1">${a.year || a.status || ''}</p>
                        </div>
                    </div>
                `).join('');

                grid.classList.toggle('hidden', this.state.filtered.length === 0);
                empty.classList.toggle('hidden', this.state.filtered.length > 0);
                count.innerText = `${this.state.filtered.length} anime(s) trouvé(s)`;
            },

            async openDetail(id) {
                const anime = this.state.all.find(a => a.mal_id === id);
                if (!anime) return;

                const isFav = this.state.favs.includes(id);
                const modal = document.getElementById('modalContent');
                this.toggleModal(true);

                modal.innerHTML = `
                    <div class="flex flex-col md:flex-row">
                        <div class="md:w-1/3">
                            <img src="${anime.images.jpg.large_image_url}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 p-6 md:p-10">
                            <div class="flex justify-between items-start gap-4 mb-4">
                                <h2 class="text-2xl md:text-3xl font-bold">${anime.title}</h2>
                                <button onclick="RAKUEN.toggleFav(${id})" class="text-xl ${isFav ? 'text-red-500' : 'text-gray-500'} hover:scale-110 transition-transform">
                                    <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                                </button>
                            </div>
                            <div class="flex flex-wrap gap-3 mb-6 text-xs font-semibold text-gray-400">
                                <span class="text-brand-orange">${anime.type}</span>
                                <span>${anime.episodes || '?'} eps</span>
                                <span>${anime.score || 'N/A'} ★</span>
                                <span>${anime.year || ''}</span>
                            </div>
                            <p class="text-gray-300 text-sm leading-relaxed mb-6">${anime.synopsis || 'Pas de synopsis.'}</p>
                            <div class="flex flex-wrap gap-2">
                                ${anime.genres?.map(g => `<span class="px-2 py-1 bg-white/5 border border-white/10 rounded text-[10px]">${g.name}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            toggleFav(id) {
                const idx = this.state.favs.indexOf(id);
                if (idx > -1) this.state.favs.splice(idx, 1);
                else this.state.favs.push(id);
                localStorage.setItem('rakuen_favs_v3', JSON.stringify(this.state.favs));
                this.openDetail(id);
            },

            toggleFavsFilter() {
                const btn = document.getElementById('favBtn');
                if (btn.classList.contains('text-red-500')) {
                    btn.classList.remove('text-red-500');
                    this.state.filtered = [...this.state.all];
                } else {
                    btn.classList.add('text-red-500');
                    this.state.filtered = this.state.all.filter(a => this.state.favs.includes(a.mal_id));
                }
                this.renderGrid();
            },

            async loadCalendar() {
                this.showLoader(true);
                const res = await this.fetchAPI('/schedules');
                if (res?.data) {
                    this.state.filtered = res.data;
                    this.renderGrid();
                    document.getElementById('resultCount').innerText = "Programme de la semaine";
                }
                this.showLoader(false);
            },

            toggleModal(show) {
                const m = document.getElementById('detailModal');
                m.classList.toggle('hidden', !show);
                document.body.style.overflow = show ? 'hidden' : 'auto';
            },

            showLoader(show) {
                document.getElementById('loader').classList.toggle('hidden', !show);
                document.getElementById('animeGrid').classList.toggle('hidden', show);
            }
        };

        document.addEventListener('DOMContentLoaded', () => RAKUEN.init());
    </script>
</body>
</html>
